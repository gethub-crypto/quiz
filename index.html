<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game PRO</title>

<style>
body {
    background: #0f172a;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    margin: 0;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    font-size: 20px;
}

#shopBtn {
    background: #f59e0b;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

/* SCREENS */
.screen {
    display: none;
}

/* MAP */
#map {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.levelBtn {
    width: 70px;
    height: 70px;
    margin: 10px;
    border-radius: 50%;
    border: none;
    font-size: 20px;
    background: #1e293b;
    color: white;
    cursor: pointer;
}

.super {
    background: gold;
    color: black;
}

/* GAME */
#game {
    padding: 20px;
}

#question {
    font-size: 22px;
    margin: 20px 0;
}

.answer {
    display: block;
    width: 90%;
    margin: 10px auto;
    padding: 14px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #334155;
    color: white;
    cursor: pointer;
}

.answer:hover {
    background: #475569;
}

/* PROGRESS */
#progressContainer {
    width: 90%;
    height: 12px;
    background: #1e293b;
    margin: 10px auto;
    border-radius: 10px;
    display: none;
}

#progressBar {
    height: 12px;
    width: 0%;
    background: #22c55e;
    border-radius: 10px;
    transition: width .4s;
}

/* REWARD */
#reward {
    padding: 20px;
}

button {
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div>❤️ <span id="lives">3</span></div>
    <button id="shopBtn" onclick="openShop()">Shop</button>
    <div>🪙 <span id="coins">0</span></div>
</div>

<!-- MAP SCREEN -->
<div id="map" class="screen"></div>

<!-- GAME SCREEN -->
<div id="game" class="screen">

    <div id="levelTitle"></div>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <div id="progressText"></div>

    <div id="question"></div>
    <div id="answers"></div>

</div>

<!-- REWARD SCREEN -->
<div id="reward" class="screen">
    <h2>Level Complete</h2>
    <p>You earned <span id="rewardCoins"></span> coins</p>

    <button onclick="doubleReward()">x2 Reward (Ad)</button>
    <button onclick="nextLevel()">Next Level</button>
</div>

<!-- SCRIPT -->
<script type="module" src="js/main.js"></script>

</body>
</html>
